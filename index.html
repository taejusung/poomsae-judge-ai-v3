<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>품새 AI 심판</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#080c10;color:#e8eaf0;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.scr{display:none;min-height:100dvh;flex-direction:column}
.scr.on{display:flex}

/* ── 공통 ── */
h1{font-size:1.6rem;font-weight:800;text-align:center;letter-spacing:-.5px}
h2{font-size:1.15rem;font-weight:700;margin-bottom:10px}
.sub{color:#7a8494;font-size:.82rem;text-align:center;margin-top:4px}
btn,button{border:none;border-radius:12px;padding:12px 16px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .12s,transform .08s;font-family:inherit}
button:active{opacity:.7;transform:scale(.97)}
input,select{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #1e2535;background:#111827;color:#e8eaf0;font-size:1rem;margin-bottom:10px;outline:none;font-family:inherit}
input:focus,select:focus{border-color:#5b6ef5}
select option{background:#111827}
.card{background:#111827;border-radius:16px;padding:14px;margin-bottom:10px}
.row{display:flex;gap:8px}
.col{flex:1}

/* ── 화면1 ── */
#s1{justify-content:center;padding:24px 20px}
.logo{font-size:3.5rem;text-align:center;margin-bottom:12px}
.btn-main{width:100%;background:linear-gradient(135deg,#e84393,#7b2fff);color:#fff;padding:16px;font-size:1.05rem;border-radius:14px;margin-top:6px}
.rank-hint{color:#7a8494;font-size:.78rem;text-align:center;margin-top:8px}

/* ── 화면2 카메라 (🛠️ 후면 카메라 매핑을 위해 좌우 반전 제거) ── */
#s2{padding:0;background:#000}
.cam-wrap{position:relative;width:100%;background:#000;flex-shrink:0}
#video{display:block;width:100%;max-height:52dvh;object-fit:cover}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.hud-tl{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.hud-tr{position:absolute;top:8px;right:8px;pointer-events:none}
.badge{display:inline-block;background:rgba(0,0,0,.72);border-radius:8px;padding:3px 8px;font-size:.72rem;backdrop-filter:blur(6px)}
.g{color:#3ddc84}.r{color:#ff5252}.y{color:#ffd740}.b{color:#40c4ff}

/* 시퀀스 HUD (카메라 위) */
.seq-hud{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:10px 12px 8px}
.seq-hud-step{font-size:.68rem;color:#aaa}
.seq-hud-desc{font-size:1rem;font-weight:700;color:#ffd740;line-height:1.2}
.seq-hud-match{font-size:.78rem;margin-top:2px;min-height:1.1em}

/* 점수 패널 */
.score-panel{padding:8px 12px 0;flex-shrink:0}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.si{background:#0d1421;border-radius:10px;padding:7px 5px;text-align:center}
.sl{display:block;font-size:.6rem;color:#5a6478;margin-bottom:1px}
.sv{font-size:1.15rem;font-weight:700}
.sv.gd{color:#3ddc84}.sv.md{color:#ffd740}.sv.bd{color:#ff6b6b}
.total-row{display:flex;justify-content:space-between;align-items:center;background:#0d1421;border-radius:10px;padding:7px 12px;margin-bottom:6px}
.total-n{font-size:1.9rem;font-weight:800;color:#ffd740}

/* 동결 바 */
.fbar-wrap{height:5px;background:#1e2535;border-radius:3px;margin:0 0 4px;overflow:hidden}
.fbar-fill{height:100%;background:linear-gradient(90deg,#7b2fff,#e84393);border-radius:3px;transition:width .2s}
.fbar-lbl{font-size:.65rem;color:#5a6478;text-align:center;margin-bottom:6px}

/* 기합 */
.kiai-row{display:flex;align-items:center;gap:8px;padding:0 12px 6px}
.kiai-bar-w{flex:1;height:8px;background:#1e2535;border-radius:4px;overflow:hidden}
.kiai-bar{height:100%;background:linear-gradient(90deg,#ff5252,#ffd740);border-radius:4px;transition:width .04s}
.kiai-lbl{font-size:.75rem;color:#ffd740;white-space:nowrap;min-width:70px;text-align:right}

/* 시퀀스 상세 */
.seq-detail{background:#0d1421;margin:0 10px 6px;border-radius:12px;padding:8px 10px;flex-shrink:0}
.seq-det-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.seq-det-step{font-size:.75rem;color:#7a8494}
.seq-det-ded{font-size:.78rem;font-weight:700;color:#ff6b6b}
.seq-det-exp{font-size:.82rem;margin-bottom:6px}
.seq-nav{display:flex;gap:5px}
.btn-seq{background:#1e2535;color:#c8ccd4;flex:1;font-size:.78rem;padding:7px 4px}
.btn-ov{background:#0f2a18;color:#3ddc84;font-size:.72rem;padding:7px 4px}

/* 컨트롤 */
.ctrl{display:flex;gap:6px;padding:6px 10px 8px;flex-shrink:0}
.btn-cal{background:#102040;color:#40c4ff;flex:1;font-size:.8rem;padding:9px}
.btn-go{background:linear-gradient(135deg,#3ddc84,#00b4d8);color:#000;flex:1;font-size:.8rem;padding:9px}
.btn-stp{background:#200a0a;color:#ff5252;flex:1;font-size:.8rem;padding:9px}

/* ── 화면3 조정 ── */
#s3{padding:14px 12px}
.adj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.adj-item{background:#111827;border-radius:12px;padding:10px}
.adj-nm{font-size:.68rem;color:#7a8494;margin-bottom:3px}
.adj-row{display:flex;align-items:center;justify-content:space-between}
.adj-v{font-size:1.25rem;font-weight:700;color:#e8eaf0;min-width:36px}
.adj-btns{display:flex;gap:3px}
.btn-m{background:#200a0a;color:#ff6b6b;padding:5px 9px;font-size:.9rem}
.btn-p{background:#0a1f0a;color:#3ddc84;padding:5px 9px;font-size:.9rem}

.sec-lbl{font-size:.78rem;color:#7a8494;margin-bottom:5px;margin-top:2px}
.pen-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.btn-pen{background:#1a0d0d;color:#ff9966;font-size:.75rem;padding:8px;flex:1;min-width:72px}
.btn-bon{background:#0a1a0a;color:#3ddc84;font-size:.75rem;padding:8px;flex:1;min-width:72px}

.final-box{background:#0d1421;border-radius:14px;padding:14px;text-align:center;margin-bottom:10px}
.final-lbl{font-size:.8rem;color:#7a8494}
.final-sc{font-size:3.2rem;font-weight:800;color:#ffd740;line-height:1}
.final-bk{font-size:.72rem;color:#5a6478;margin-top:4px}

.btn-conf{background:linear-gradient(135deg,#3ddc84,#00b4d8);color:#000;width:100%;padding:14px;font-size:1rem;margin-bottom:8px}
.btn-rem{background:#1e2535;color:#a0a8b4;width:100%;padding:12px;font-size:.9rem}

/* seq log in s3 */
.seq-log{font-size:.7rem;color:#7a8494;max-height:60px;overflow-y:auto;margin-top:4px}

/* ── 화면4 순위 ── */
#s4{padding:14px 12px}
.rank-list{flex:1;overflow-y:auto}
.ri{background:#111827;border-radius:14px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ri-medal{font-size:1.7rem;min-width:38px;text-align:center}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-pm{font-size:.7rem;color:#7a8494}
.ri-det{font-size:.62rem;color:#4a5568;margin-top:2px;line-height:1.4}
.ri-sc{font-size:1.6rem;font-weight:800;color:#ffd740;min-width:52px;text-align:right}
.rank-btns{display:flex;gap:8px;margin-top:10px;flex-shrink:0}
.btn-nx{background:linear-gradient(135deg,#e84393,#7b2fff);color:#fff;flex:1;padding:14px}
.btn-rst{background:#1e2535;color:#a0a8b4;flex:1;padding:14px}

/* ── 오버레이 ── */
#calib-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;flex-direction:column;align-items:center;justify-content:center}
#calib-ov.on{display:flex}
.calib-n{font-size:5rem;font-weight:800;color:#ffd740;animation:pulse 1s infinite}
.calib-m{font-size:1rem;color:#e8eaf0;margin-top:10px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.94)}}

/* 불일치 토스트형 감점 제안 */
#mismatch-ov{display:none;position:fixed;bottom:20%;left:50%;transform:translateX(-50%);background:#1e2535;border-radius:16px;padding:14px 18px;z-index:180;text-align:center;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#mismatch-ov.on{display:block}
.mo-lbl{font-size:.78rem;color:#ff6b6b;margin-bottom:8px}
.mo-btns{display:flex;gap:8px}
.btn-ded1{background:#2a1010;color:#ff9966;flex:1;padding:9px;font-size:.8rem}
.btn-ded3{background:#3a0f0f;color:#ff5252;flex:1;padding:9px;font-size:.8rem}
.btn-skip{background:#1e2535;color:#7a8494;flex:1;padding:9px;font-size:.78rem}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:9px 18px;border-radius:20px;font-size:.85rem;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}

#loading{position:fixed;inset:0;background:#080c10;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ld-logo{font-size:4rem;margin-bottom:16px}
.ld-txt{font-size:.95rem;color:#7a8494}
.ld-bar{width:200px;height:4px;background:#1e2535;border-radius:2px;margin-top:14px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,#7b2fff,#e84393);border-radius:2px;animation:ldf 3s ease-out forwards}
@keyframes ldf{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">🥋</div>
  <div class="ld-txt">MediaPipe 로딩 중…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>
<div id="toast"></div>
<div id="calib-ov">
  <div class="calib-n" id="calib-n">3</div>
  <div class="calib-m">차렷 자세로 서 계세요</div>
</div>
<div id="mismatch-ov">
  <div class="mo-lbl" id="mo-lbl">❌ 동작 불일치</div>
  <div class="mo-btns">
    <button class="btn-ded1" onclick="applyMismatch(-0.1)">경미 -0.1</button>
    <button class="btn-ded3" onclick="applyMismatch(-0.3)">심각 -0.3</button>
    <button class="btn-skip" onclick="closeMismatch()">무시</button>
  </div>
</div>

<div class="scr" id="s1">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;max-width:420px;margin:0 auto;width:100%;padding:24px 20px">
    <div class="logo">🥋</div>
    <h1>품새 AI 심판</h1>
    <p class="sub">선수 정보를 입력하세요</p>
    <div style="height:20px"></div>
    <div class="card">
      <label style="font-size:.75rem;color:#7a8494;display:block;margin-bottom:5px">선수 이름</label>
      <input id="inp-name" type="text" placeholder="이름 입력" maxlength="20">
      <label style="font-size:.75rem;color:#7a8494;display:block;margin-bottom:5px">품새 선택</label>
      <select id="sel-poom">
        <option value="태극4장">태극 4장</option>
        <option value="태극5장">태극 5장</option>
        <option value="태극6장">태극 6장</option>
        <option value="태극7장">태극 7장</option>
        <option value="태극8장">태극 8장</option>
        <option value="고려">고려</option>
        <option value="금강">금강</option>
        <option value="태백">태백</option>
      </select>
    </div>
    <button class="btn-main" onclick="goMeasure()">📷 촬영 시작</button>
    <div class="rank-hint" id="rank-hint"></div>
  </div>
</div>

<div class="scr" id="s2">
  <div class="cam-wrap" id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="hud-tl">
      <span class="badge" id="mp-badge">⏳ 초기화</span>
      <span class="badge" id="dir-badge">정면</span>
    </div>
    <div class="hud-tr">
      <span class="badge y" id="frozen-badge" style="display:none">❄️ 동결</span>
    </div>
    <div class="seq-hud">
      <div class="seq-hud-step" id="sh-step">동작 1 / 25</div>
      <div class="seq-hud-desc" id="sh-desc">아래막기</div>
      <div class="seq-hud-match" id="sh-match"></div>
    </div>
  </div>

  <div class="score-panel">
    <div class="sg">
      <div class="si"><span class="sl">서기</span><span class="sv" id="sc-st">-</span></div>
      <div class="si"><span class="sl">손기술</span><span class="sv" id="sc-ar">-</span></div>
      <div class="si"><span class="sl">자세</span><span class="sv" id="sc-po">-</span></div>
      <div class="si"><span class="sl">절도</span><span class="sv" id="sc-pw">-</span></div>
      <div class="si"><span class="sl">균형</span><span class="sv" id="sc-ba">-</span></div>
      <div class="si"><span class="sl">리듬</span><span class="sv" id="sc-rh">-</span></div>
    </div>
    <div class="total-row">
      <span style="font-size:.82rem;color:#7a8494">총점</span>
      <span class="total-n" id="sc-tot">-</span>
      <span style="font-size:.75rem;color:#7a8494">/ 100</span>
    </div>
  </div>

  <div style="padding:0 12px">
    <div class="fbar-wrap"><div class="fbar-fill" id="fbar" style="width:0"></div></div>
    <div class="fbar-lbl" id="fbar-lbl">채점 시작 후 10초 보호 구간</div>
  </div>

  <div class="kiai-row">
    <span style="font-size:.75rem;color:#7a8494">기합</span>
    <div class="kiai-bar-w"><div class="kiai-bar" id="kiai-bar" style="width:0"></div></div>
    <span class="kiai-lbl" id="kiai-lbl">0회 +0.0</span>
  </div>

  <div class="seq-detail">
    <div class="seq-det-top">
      <span class="seq-det-step" id="sd-step">동작 1 / 25</span>
      <span class="seq-det-ded" id="sd-ded">감점 0.0</span>
    </div>
    <div class="seq-det-exp" id="sd-exp" style="color:#ffd740;font-weight:700">아래막기</div>
    <div class="seq-nav">
      <button class="btn-seq" onclick="seqGo(-1)">← 이전</button>
      <button class="btn-ov"  onclick="undoLastDed()">감점취소</button>
      <button class="btn-seq" onclick="seqGo(+1)">다음 →</button>
    </div>
  </div>

  <div class="ctrl">
    <button class="btn-cal" onclick="doCalib()">🧍 보정</button>
    <button class="btn-go" id="btn-go" onclick="startScore()">▶ 시작</button>
    <button class="btn-stp" onclick="stopScore()">🛑 종료</button>
  </div>
</div>

<div class="scr" id="s3" style="overflow-y:auto">
  <h2>📊 채점 조정</h2>
  <div class="adj-grid" id="adj-grid"></div>

  <div class="card" style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.82rem;font-weight:700">시퀀스 감점</span>
      <span id="s3-seq-tot" style="color:#ff6b6b;font-weight:700">0.0점</span>
    </div>
    <div class="seq-log" id="s3-seq-log">없음</div>
  </div>

  <div class="sec-lbl">공식 감점</div>
  <div class="pen-row">
    <button class="btn-pen" onclick="applyOff(-0.1)">경미<br>-0.1</button>
    <button class="btn-pen" onclick="applyOff(-0.3)">심각<br>-0.3</button>
    <button class="btn-pen" onclick="applyOff(-0.3)">경계이탈<br>-0.3</button>
  </div>
  <div class="sec-lbl">가산점</div>
  <div class="pen-row">
    <button class="btn-bon" onclick="applyOff(1)">절도우수<br>+1</button>
    <button class="btn-bon" onclick="applyOff(2)">자세우수<br>+2</button>
    <button class="btn-bon" onclick="applyOff(3)">기합<br>+3</button>
    <button class="btn-bon" onclick="applyOff(5)">완벽<br>+5</button>
  </div>
  <div class="final-box">
    <div class="final-lbl">최종 점수</div>
    <div class="final-sc" id="f-sc">0.0</div>
    <div class="final-bk" id="f-bk"></div>
  </div>
  <button class="btn-conf" onclick="confirmScore()">✅ 점수 확정</button>
  <button class="btn-rem"  onclick="remeasure()">🔄 재측정</button>
  <div style="height:20px"></div>
</div>

<div class="scr" id="s4" style="overflow-y:auto">
  <h2>🏆 전체 순위</h2>
  <div class="rank-list" id="rank-list"></div>
  <div class="rank-btns">
    <button class="btn-nx"  onclick="nextPlayer()">➕ 다음 선수</button>
    <button class="btn-rst" onclick="resetAll()">🔄 초기화</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  품새 DB (사범님 검증)
// ══════════════════════════════════════════
const DB={

    {t:'KN2',h:'M',s:'B',desc:'오른 뒷굽이 쌍손날몸통막기'},

    {t:'BL2',h:'M',s:'F',desc:'왼 앞굽이 가위막기'},
    {t:'KI',h:'M',s:'-',desc:'왼발 앞차기'},

// ══════════════════════════════════════════
//  전역 상태
// ══════════════════════════════════════════
let holistic=null,camStream=null,animId=null;
let playerName='',poomName='',poomSeq=[];
let step=0;
let seqDeds=[];           // {step,desc,amount}
let calibData=null;
let scoring=false,isFrozen=false,frozenSc=null;
let scoreStart=0,stillFrames=0;

// 스무딩
let sm={st:0,ar:0,po:0,pw:0,ba:0,rh:0};
let pk={st:0,ar:0,po:0,pw:0,ba:0,rh:0};

// 기술 이력 (버그2)
const TMAX=20;
let techHist=[];

// 각속도 상태머신
let techPhase='idle',phFrames=0;
const MOVE_T=3.5,SETTLE_T=1.5,MIN_MV=4,MIN_ST=8;
let avHist=[],prevAngles=null;

// 이전 포즈
let prevLM=null;
let rhythmHist=[];

// 기합
let kiaiCnt=0,kiaiSc=0,micAna=null,volHist=[],lastKiai=0;

// 화면3 상태
let adjDelta={st:0,ar:0,po:0,pw:0,ba:0,rh:0};
let offAdj=0; // 공식 감점/가산 합계

// 순위
let rankings=[];

// ══════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════
function ang3(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y,m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m?Math.acos(Math.max(-1,Math.min(1,d/m)))*180/Math.PI:180;
}
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
function toast(msg,ms=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),ms);
}
function scr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function cv(v,mx){return v/mx>=.8?'gd':v/mx>=.5?'md':'bd';}

// ══════════════════════════════════════════
//  손 모양
// ══════════════════════════════════════════
function handShape(h){
  if(!h)return'?';
  const o=[8,12,16,20].filter(i=>h[i].y<h[i-2].y).length;
  return o>=3?'open':o<=1?'fist':'partial';
}

// ══════════════════════════════════════════
//  보정 계산
// ══════════════════════════════════════════
function calcCalib(lm){
  if(!lm)return null;
  const ls=lm[11],rs=lm[12],lh=lm[23],rh=lm[24];
  return{
    sw:Math.abs(ls.x-rs.x),
    hipY:(lh.y+rh.y)/2,
    shY:(ls.y+rs.y)/2
  };
}

// ══════════════════════════════════════════
//  기술 유형 감지
// ══════════════════════════════════════════
function detectTech(lm,lh,rh){
  if(!lm)return null;
  const cd=calibData||calcCalib(lm);
  if(!cd)return null;
  const {hipY,shY,sw}=cd;
  const la=lm[27],ra=lm[28],lw=lm[15],rw=lm[16];
  const cx=(lm[11].x+lm[12].x)/2;

  // 발차기
  const kickH=Math.max(0,hipY-Math.min(la.y,ra.y));
  if(kickH>0.06){
    const rel=kickH/Math.max(hipY-shY,.01);
    return{t:'KI',h:rel>.7?'H':'M'};
  }
  // 손기술
  const aw=lw.y<rw.y?lw:rw;
  const rel=(aw.y-shY)/Math.max(hipY-shY,.01);
  const h=rel<0?'H':rel<.45?'M':'L';
  const lE=ang3(lm[11],lm[13],lm[15]),rE=ang3(lm[12],lm[14],lm[16]);
  const maxE=Math.max(lE,rE);
  const shape=handShape(lw.y<rw.y?lh:rh);
  if(maxE>160)return{t:'PU',h,shape};
  if(shape==='open')return{t:'KN',h,shape};
  return{t:'BL',h,shape};
}

// ══════════════════════════════════════════
//  채점
// ══════════════════════════════════════════
function scoreFrame(lm,lh,rh){
  if(!lm)return null;
  const cd=calibData||calcCalib(lm);
  if(!cd)return null;
  const {sw,hipY,shY}=cd;

  // 서기
  let st=10;
  {
    const lk=ang3(lm[23],lm[25],lm[27]),rk=ang3(lm[24],lm[26],lm[28]);
    const mn=Math.min(lk,rk),mx=Math.max(lk,rk);
    const fS=mn>=120&&mn<=165?9:cl(9-Math.abs(mn-142)/5,0,9);
    const bS=mx>=150&&mx<=180?6:cl(6-Math.abs(mx-165)/4,0,6);
    const fd=Math.hypot(lm[31].x-lm[32].x,lm[31].y-lm[32].y);
    const fdS=cl(5-Math.abs(fd-sw*1.7)/sw*10,0,5);
    st=cl(fS+bS+fdS,0,20);
  }

  // 손기술
  let ar=0;
  {
    const lE=ang3(lm[11],lm[13],lm[15]),rE=ang3(lm[12],lm[14],lm[16]);
    const mx=Math.max(lE,rE),mn=Math.min(lE,rE);
    const pS=mx>=165?8:cl((mx-130)/35*8,0,8);
    const pullS=(mn>=45&&mn<=90)?4:cl(4-Math.abs(mn-67.5)/20,0,4);
    const aw=lE>rE?lm[15]:lm[16];
    const rel=(aw.y-shY)/Math.max(hipY-shY,.01);
    const hS=(rel<0||(rel>=.3&&rel<=.7))?4:2;
    const shp=handShape(lE>rE?lh:rh);
    const shpB=shp==='fist'?2:shp==='open'?1.5:1;
    ar=cl(pS+pullS+hS+shpB,0,20);
  }

  // 자세
  let po=20;
  {
    const ls=lm[11],rs=lm[12],lh2=lm[23],rh2=lm[24];
    const shT=Math.abs(ls.y-rs.y)/Math.max(sw,.01);
    const hipT=Math.abs(lh2.y-rh2.y)/Math.max(sw,.01);
    const sp=Math.abs((ls.x+rs.x)/2-(lh2.x+rh2.x)/2)/Math.max(sw,.01);
    const hd=Math.abs(lm[0].x-(ls.x+rs.x)/2)/Math.max(sw,.01);
    po=cl(20-cl(shT/.03,0,1)*5-cl(hipT/.03,0,1)*5-cl(sp/.05,0,1)*5-cl(hd/.05,0,1)*5,0,20);
  }

  // 절도
  let pw=0;
  {
    const lE=ang3(lm[11],lm[13],lm[15]),rE=ang3(lm[12],lm[14],lm[16]);
    const lK=ang3(lm[23],lm[25],lm[27]),rK=ang3(lm[24],lm[26],lm[28]);
    let av=0;
    if(prevAngles){
      const dE=Math.max(Math.abs(lE-prevAngles.lE),Math.abs(rE-prevAngles.rE));
      const dK=Math.max(Math.abs(lK-prevAngles.lK),Math.abs(rK-prevAngles.rK));
      av=dE*.7+dK*.3;
    }
    prevAngles={lE,rE,lK,rK};
    avHist.push(av);if(avHist.length>30)avHist.shift();
    const peakAV=Math.max(...avHist);
    const avS=cl(peakAV/18*16,0,16);
    const la2=lm[27],ra2=lm[28];
    const kh=Math.max(0,hipY-Math.min(la2.y,ra2.y));
    const kB=kh/Math.max(hipY-shY,.01)>.8?4:kh/Math.max(hipY-shY,.01)>.4?2:0;
    pw=cl(avS+kB,0,20);
  }

  // 균형
  let ba=10;
  {
    const ls=lm[11],rs=lm[12],lh2=lm[23],rh2=lm[24];
    const sT=Math.abs(ls.y-rs.y)/Math.max(sw,.01);
    const hT=Math.abs(lh2.y-rh2.y)/Math.max(sw,.01);
    ba=cl(10-cl(sT/.04,0,1)*4-cl(hT/.03,0,1)*4,5,10);
  }

  // 리듬
  let rh2=10;
  {
    const lw2=lm[15],rw2=lm[16];
    const mo=prevLM?Math.hypot(lw2.x-prevLM[15].x,lw2.y-prevLM[15].y)+Math.hypot(rw2.x-prevLM[16].x,rw2.y-prevLM[16].y):0;
    rhythmHist.push(mo);if(rhythmHist.length>30)rhythmHist.shift();
    if(rhythmHist.length>=10){
      const avg=rhythmHist.reduce((s,v)=>s+v,0)/rhythmHist.length;
      const std=Math.sqrt(rhythmHist.reduce((s,v)=>s+(v-avg)**2,0)/rhythmHist.length);
      const act=cl(avg/.02,0,1);
      rh2=cl(10*(1-Math.min(std/(avg||1),.8)*.5)*(.4+act*.6),0,10);
    }
  }
  return{st,ar,po,pw,ba,rh:rh2};
}

// ══════════════════════════════════════════
//  스무딩 (비대칭, 버그2 수정)
// ══════════════════════════════════════════
function applySmooth(k,raw){
  const up=raw>sm[k];
  sm[k]=sm[k]*(up?.85:.99)+raw*(up?.15:.01);
  if(sm[k]>pk[k])pk[k]=sm[k];
}

// ══════════════════════════════════════════
//  기술 이력 추가 (버그2)
// ══════════════════════════════════════════
function addTech(ts){
  const sum=t=>t.st+t.ar+t.pw;
  if(techHist.length>3){
    const avg=techHist.reduce((s,t)=>s+sum(t),0)/techHist.length;
    if(sum(ts)<avg*.55)return;
  }
  techHist.push(ts);
  if(techHist.length>TMAX)techHist.shift();
  if(techHist.length>=8){
    techHist.sort((a,b)=>sum(a)-sum(b));
    techHist=techHist.slice(Math.floor(techHist.length*.25));
  }
}

// ══════════════════════════════════════════
//  기술 완료 → 시퀀스
// ══════════════════════════════════════════
let mismatchStep=-1;
function onTechDone(lm,lh,rh){
  if(!scoring||isFrozen)return;
  const det=detectTech(lm,lh,rh);
  if(!det)return;
  const exp=poomSeq[step];
  if(!exp)return;

  // 간략 매칭: 기술 계열 비교
  const tMatch=techFamilyMatch(det.t,exp.t);
  const hMatch=!exp.h||exp.h==='-'||det.h===exp.h;
  const matched=tMatch&&hMatch;

  // 기합 필요 동작 경고
  if(exp.kihap&&kiaiCnt===0&&step===step){
    document.getElementById('sh-match').textContent='⚠️ 기합 필요!';
    document.getElementById('sh-match').style.color='#ff9966';
  } else {
    document.getElementById('sh-match').textContent=matched?'✅ 일치':'❌ 불일치';
    document.getElementById('sh-match').style.color=matched?'#3ddc84':'#ff5252';
  }

  if(!matched){
    // 불일치 패널 표시
    mismatchStep=step;
    document.getElementById('mo-lbl').textContent=`❌ #${step+1} ${exp.desc} – 감지: ${det.t}`;
    document.getElementById('mismatch-ov').classList.add('on');
    setTimeout(()=>document.getElementById('mismatch-ov').classList.remove('on'),6000);
  }

  if(step<poomSeq.length-1){step++;updateSeqUI();}
}

function techFamilyMatch(got,exp){
  // 같으면 true, KN/KN2 같은 계열도 허용
  if(got===exp)return true;
  const fam={
    BL:['BL','BL2','KN','KN2','PB'],
    PU:['PU','PU2','THR','ST','ST2'],
    KI:['KI','KI2'],
  };
  for(const f of Object.values(fam)){
    if(f.includes(got)&&f.includes(exp))return true;
  }
  return false;
}

function applyMismatch(amt){
  seqDeds.push({step:mismatchStep,desc:poomSeq[mismatchStep]?.desc||'?',amount:amt});
  updateSeqDedUI();
  closeMismatch();
}
function closeMismatch(){document.getElementById('mismatch-ov').classList.remove('on');}

//  동결

function doFreeze(){
  isFrozen=true;frozenSc={...sm};
  document.getElementById('frozen-badge').style.display='inline';
  document.getElementById('fbar-lbl').textContent='❄️ 점수 동결됨';

// ══════════════════════════════════════════
//  onResults (MediaPipe)
// ══════════════════════════════════════════
function onResults(res){
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');

  // 버그1: canvas 크기 동기화
  const r=video.getBoundingClientRect();
  if(canvas.width!==r.width||canvas.height!==r.height){
    canvas.width=r.width;canvas.height=r.height;
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(res.poseLandmarks){
    drawConnectors(ctx,res.poseLandmarks,POSE_CONNECTIONS,{color:'rgba(255,255,255,.4)',lineWidth:2});
    drawLandmarks(ctx,res.poseLandmarks,{color:'#e84393',lineWidth:1,radius:3});
  }
  if(res.leftHandLandmarks){
    drawConnectors(ctx,res.leftHandLandmarks,HAND_CONNECTIONS,{color:'rgba(61,220,132,.7)',lineWidth:2});
    drawLandmarks(ctx,res.leftHandLandmarks,{color:'#3ddc84',lineWidth:1,radius:2});
  }
  if(res.rightHandLandmarks){
    drawConnectors(ctx,res.rightHandLandmarks,HAND_CONNECTIONS,{color:'rgba(64,196,255,.7)',lineWidth:2});
    drawLandmarks(ctx,res.rightHandLandmarks,{color:'#40c4ff',lineWidth:1,radius:2});
  }

  const lm=res.poseLandmarks,lh=res.leftHandLandmarks,rh=res.rightHandLandmarks;

  // 배지
  const mpB=document.getElementById('mp-badge');
  mpB.textContent=lm?'🟢 감지중':'🔴 미감지';
  mpB.className='badge '+(lm?'g':'r');

  if(lm){
    const ls=lm[11],rs=lm[12],sw=Math.abs(ls.x-rs.x);
    const zd=ls.z-rs.z;
    const dir=sw<.08?(zd<0?'오른쪽':'왼쪽'):(zd<-.05?'약우측':zd>.05?'약좌측':'정면');
    const dB=document.getElementById('dir-badge');
    dB.textContent=dir;dB.className='badge '+(dir==='정면'?'g':'y');
  }

  if(!lm){prevLM=null;return;}

  if(scoring&&!isFrozen){
    const raw=scoreFrame(lm,lh,rh);
    if(raw){
      Object.keys(raw).forEach(k=>applySmooth(k,raw[k]));

      // 각속도 상태머신
      const curAV=avHist.length?avHist[avHist.length-1]:0;
      if(techPhase==='idle'){
        if(curAV>MOVE_T){techPhase='moving';phFrames=1;}
      }else if(techPhase==='moving'){
        phFrames++;
        if(curAV<SETTLE_T){
          if(phFrames>=MIN_MV){techPhase='settling';phFrames=0;}
          else{techPhase='idle';}
        }
      }else if(techPhase==='settling'){
        phFrames++;
        if(curAV>MOVE_T){techPhase='moving';phFrames=1;}
        else if(phFrames>=MIN_ST){
          onTechDone(lm,lh,rh);
          addTech({st:raw.st,ar:raw.ar,pw:raw.pw});
          techPhase='idle';phFrames=0;
        }
      }

      // 동결 체크
      const el=Date.now()-scoreStart;
      const prog=cl(el/10000,0,1);
      document.getElementById('fbar').style.width=(prog*100)+'%';
      const mo=prevLM?Math.hypot(lm[15].x-prevLM[15].x,lm[15].y-prevLM[15].y)+
        Math.hypot(lm[16].x-prevLM[16].x,lm[16].y-prevLM[16].y)+
        (Math.hypot(lm[25].x-prevLM[25].x,lm[25].y-prevLM[25].y)+
         Math.hypot(lm[26].x-prevLM[26].x,lm[26].y-prevLM[26].y))*.5:1;
      if(mo<.006)stillFrames++;else stillFrames=0;
      if(el>10000&&stillFrames>=18)doFreeze();
      else if(el>=10000)document.getElementById('fbar-lbl').textContent='✅ 동결 보호 활성화';
    }

    // 피크 보호
    const fs={};
    ['st','ar','po','pw','ba','rh'].forEach(k=>{fs[k]=Math.max(sm[k],pk[k]*.85);});
    const tot=cl(fs.st+fs.ar+fs.po+fs.pw+fs.ba+fs.rh+kiaiSc,0,100);
    updateScoreUI(fs,tot);
  }
  prevLM=lm;
}

// ══════════════════════════════════════════
//  기합 마이크
// ══════════════════════════════════════════
async function initMic(){
  try{
    const ms=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const ac=new AudioContext();
    const src=ac.createMediaStreamSource(ms);
    micAna=ac.createAnalyser();micAna.fftSize=256;
    src.connect(micAna);tickMic();
  }catch(e){}
}
function tickMic(){
  if(!micAna)return;
  const d=new Uint8Array(micAna.frequencyBinCount);
  micAna.getByteFrequencyData(d);
  const vol=d.reduce((s,v)=>s+v,0)/d.length;
  volHist.push(vol);if(volHist.length>20)volHist.shift();
  const avg=volHist.reduce((s,v)=>s+v,0)/volHist.length;
  if(scoring&&!isFrozen&&vol>45&&vol>avg*1.7&&Date.now()-lastKiai>1000&&kiaiCnt<5){
    kiaiCnt++;kiaiSc=kiaiCnt*.4;lastKiai=Date.now();toast('기합! 🗣️');
  }
  const pct=cl(vol/80*100,0,100);
  document.getElementById('kiai-bar').style.width=pct+'%';
  document.getElementById('kiai-lbl').textContent=`${kiaiCnt}회 +${kiaiSc.toFixed(1)}`;
  requestAnimationFrame(tickMic);
}

// ══════════════════════════════════════════
//  카메라 (🛠️ facingMode를 'environment'로 변경하여 후면 카메라로 지정)
// ══════════════════════════════════════════
async function initCam(){
  const video=document.getElementById('video'),canvas=document.getElementById('canvas');
  // 버그1: ResizeObserver
  const ro=new ResizeObserver(()=>{
    const r=video.getBoundingClientRect();
    if(r.width>0){canvas.width=r.width;canvas.height=r.height;}
  });
  ro.observe(video);
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}},audio:false});
    video.srcObject=camStream;
    video.onloadedmetadata=()=>{video.play();runLoop(video);};
  }catch(e){toast('카메라 오류: '+e.message);}
}
function runLoop(video){
  async function loop(){
    if(holistic&&video.readyState>=2)await holistic.send({image:video});
    animId=requestAnimationFrame(loop);
  }
  loop();
}
function stopCam(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}

// ══════════════════════════════════════════
//  보정
// ══════════════════════════════════════════
let calibTimer=null;
function doCalib(){
  const ov=document.getElementById('calib-ov'),n=document.getElementById('calib-n');
  ov.classList.add('on');let cnt=3;n.textContent=cnt;
  calibTimer=setInterval(()=>{
    cnt--;n.textContent=cnt;
    if(cnt<=0){
      clearInterval(calibTimer);ov.classList.remove('on');
      if(prevLM){calibData=calcCalib(prevLM);toast('✅ 체형 보정 완료');}
      else toast('⚠️ 포즈 감지 안 됨');
    }
  },1000);
}

// ══════════════════════════════════════════
//  화면 전환
// ══════════════════════════════════════════
function goMeasure(){
  playerName=document.getElementById('inp-name').value.trim()||'선수';
  poomName=document.getElementById('sel-poom').value;
  poomSeq=DB[poomName]||[];
  step=0;seqDeds=[];
  resetState();updateSeqUI();updateSeqDedUI();
  scr('s2');initCam();initMic();
}

function resetState(){
  scoring=false;isFrozen=false;frozenSc=null;stillFrames=0;scoreStart=0;
  sm={st:0,ar:0,po:0,pw:0,ba:0,rh:0};pk={st:0,ar:0,po:0,pw:0,ba:0,rh:0};
  techHist=[];avHist=[];rhythmHist=[];prevAngles=null;techPhase='idle';
  kiaiCnt=0;kiaiSc=0;adjDelta={st:0,ar:0,po:0,pw:0,ba:0,rh:0};offAdj=0;
  document.getElementById('fbar').style.width='0';
  document.getElementById('fbar-lbl').textContent='채점 시작 후 10초 보호 구간';
  document.getElementById('fbar-lbl').style.color='';
  document.getElementById('frozen-badge').style.display='none';
  document.getElementById('sh-match').textContent='';
  document.getElementById('btn-go').disabled=false;
  updateScoreUI({st:0,ar:0,po:0,pw:0,ba:0,rh:0},0);
}

function startScore(){
  if(!calibData&&prevLM)calibData=calcCalib(prevLM);
  scoring=true;isFrozen=false;scoreStart=Date.now();stillFrames=0;
  step=0;seqDeds=[];updateSeqUI();updateSeqDedUI();
  document.getElementById('btn-go').disabled=true;
  toast('▶ 채점 시작!');
}

function stopScore(){
  scoring=false;
  const base=isFrozen?frozenSc:{...sm};
  const fs={};
  ['st','ar','po','pw','ba','rh'].forEach(k=>{fs[k]=Math.max(base[k]||0,pk[k]*.85);});
  buildAdjScreen(fs);
  scr('s3');
}

// ══════════════════════════════════════════
//  화면3
// ══════════════════════════════════════════
const keyList=['st','ar','po','pw','ba','rh'];
const keyName={st:'서기(20)',ar:'손기술(20)',po:'자세(20)',pw:'절도(20)',ba:'균형(10)',rh:'리듬(10)'};
let adjBase={};

function buildAdjScreen(fs){
  adjBase={...fs};
  const g=document.getElementById('adj-grid');g.innerHTML='';
  keyList.forEach(k=>{
    const d=document.createElement('div');d.className='adj-item';
    d.innerHTML=`<div class="adj-nm">${keyName[k]}</div>
      <div class="adj-row">
        <span class="adj-v" id="av-${k}">${(fs[k]+(adjDelta[k]||0)).toFixed(1)}</span>
        <div class="adj-btns">
          <button class="btn-m" onclick="adjItem('${k}',-0.1)">−</button>
          <button class="btn-p" onclick="adjItem('${k}',+0.1)">＋</button>
        </div>
      </div>`;
    g.appendChild(d);
  });
  // 시퀀스 로그
  const seqTot=seqDeds.reduce((s,d)=>s+d.amount,0);
  document.getElementById('s3-seq-tot').textContent=seqTot.toFixed(1)+'점';
  document.getElementById('s3-seq-log').innerHTML=seqDeds.length?
    seqDeds.map(d=>`#${d.step+1} ${d.desc}: ${d.amount.toFixed(1)}`).join('<br>'):'없음';
  calcFinal();
}

function adjItem(k,d){
  adjDelta[k]=(adjDelta[k]||0)+d;
  document.getElementById('av-'+k).textContent=cl((adjBase[k]||0)+adjDelta[k],0,maxMap[k]).toFixed(1);
  calcFinal();
}

function applyOff(v){offAdj+=v;calcFinal();toast(v>0?`+${v}점 가산`:`${v}점 감점`);}

function calcFinal(){
  let ai=0;
  keyList.forEach(k=>{ai+=cl((adjBase[k]||0)+(adjDelta[k]||0),0,maxMap[k]);});
  ai=Math.min(ai,100);
  const seqTot=seqDeds.reduce((s,d)=>s+d.amount,0);
  const fin=cl(ai+kiaiSc+offAdj+seqTot,0,100);
  document.getElementById('f-sc').textContent=fin.toFixed(1);
  document.getElementById('f-bk').textContent=
    `AI ${ai.toFixed(1)} + 기합 ${kiaiSc.toFixed(1)} + 조정 ${offAdj>=0?'+':''}${offAdj.toFixed(1)} + 시퀀스 ${seqTot.toFixed(1)}`;
  return fin;
}

function confirmScore(){
  const fin=calcFinal();
  const fs2={};keyList.forEach(k=>{fs2[k]=cl((adjBase[k]||0)+(adjDelta[k]||0),0,maxMap[k]);});
  rankings.push({name:playerName,poom:poomName,score:fin,det:fs2,kiai:kiaiSc,seq:seqDeds.reduce((s,d)=>s+d.amount,0),off:offAdj});
  rankings.sort((a,b)=>b.score-a.score);
  buildRankScreen();scr('s4');stopCam();
}
function remeasure(){resetState();scr('s2');}

// ══════════════════════════════════════════
//  화면4
// ══════════════════════════════════════════
const medals=['🥇','🥈','🥉'];
function buildRankScreen(){
  document.getElementById('rank-list').innerHTML=rankings.map((r,i)=>`
    <div class="ri">
      <div class="ri-medal">${medals[i]||(i+1)+'위'}</div>
      <div class="ri-info">
        <div class="ri-name">${r.name}</div>
        <div class="ri-pm">${r.poom}</div>
        <div class="ri-det">서기${r.det.st?.toFixed(1)} 손${r.det.ar?.toFixed(1)} 자세${r.det.po?.toFixed(1)} 절도${r.det.pw?.toFixed(1)} 균형${r.det.ba?.toFixed(1)} 리듬${r.det.rh?.toFixed(1)}</div>
      </div>
      <div class="ri-sc">${r.score.toFixed(1)}</div>
    </div>`).join('');
}
function nextPlayer(){
  seqDeds=[];resetState();calibData=null;scr('s1');stopCam();
  document.getElementById('rank-hint').textContent=`현재 ${rankings.length}명 등록`;
}
function resetAll(){
  if(!confirm('전체 순위를 초기화할까요?'))return;
  rankings=[];seqDeds=[];resetState();calibData=null;scr('s1');stopCam();
  document.getElementById('rank-hint').textContent='';
}

// ══════════════════════════════════════════
//  MediaPipe 초기화
// ══════════════════════════════════════════
function initMP(){
  holistic=new Holistic({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
  holistic.setOptions({modelComplexity:1,smoothLandmarks:true,
    enableSegmentation:false,refineFaceLandmarks:false,
    minDetectionConfidence:.5,minTrackingConfidence:.5});
  holistic.onResults(onResults);
  holistic.initialize().then(()=>{
    document.getElementById('loading').style.display='none';
    scr('s1');
  }).catch(e=>{
    document.querySelector('.ld-txt').textContent='로딩 실패 – 새로고침';
    console.error(e);
  });
}

window.addEventListener('load',initMP);
</script>
